name: Backend Main Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-main-deploy
  cancel-in-progress: false

jobs:
  build-image:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout merged main commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image names
        id: image
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          short_sha="${HEAD_SHA:0:12}"
          base_hash="$(sha256sum services/moodle/docker/runtime-base/Dockerfile services/moodle/go.mod services/moodle/go.sum | sha256sum | cut -c1-16)"

          echo "base=ghcr.io/dotnaos/moodle-runtime-base:bookworm-${base_hash}" >> "${GITHUB_OUTPUT}"
          echo "ref=ghcr.io/dotnaos/moodle:main-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "latest=ghcr.io/dotnaos/moodle:latest-amd64" >> "${GITHUB_OUTPUT}"

      - name: Check runtime base image
        id: runtime_base
        continue-on-error: true
        shell: bash
        run: docker buildx imagetools inspect "${{ steps.image.outputs.base }}" >/dev/null

      - name: Build and push runtime base image fallback
        if: steps.runtime_base.outcome != 'success'
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          file: services/moodle/docker/runtime-base/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.base }}
          cache-from: type=gha,scope=backend-runtime-base
          cache-to: type=gha,mode=max,scope=backend-runtime-base

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest }}
          build-args: |
            RUNTIME_BASE_IMAGE=${{ steps.image.outputs.base }}
          cache-from: type=gha,scope=backend-container-amd64
          cache-to: type=gha,mode=max,scope=backend-container-amd64

  deploy:
    needs: build-image
    uses: ./.github/workflows/backend-deploy-vps.yml
    with:
      image: ${{ needs.build-image.outputs.image-ref }}
      ref: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit
