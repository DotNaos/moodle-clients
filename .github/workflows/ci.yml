name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 23.9.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/moodle
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/moodle/go.mod
          cache: true
          cache-dependency-path: services/moodle/go.sum

      - name: Run backend tests
        run: go test ./...

  backend-docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime base image
        id: runtime_base
        shell: bash
        run: |
          set -euo pipefail

          hash="$(sha256sum services/moodle/docker/runtime-base/Dockerfile services/moodle/go.mod services/moodle/go.sum | sha256sum | cut -c1-16)"
          echo "ref=ghcr.io/dotnaos/moodle-runtime-base:bookworm-${hash}" >> "${GITHUB_OUTPUT}"

      - name: Pull runtime base image
        id: pull_runtime_base
        continue-on-error: true
        shell: bash
        run: |
          docker pull "${{ steps.runtime_base.outputs.ref }}"
          docker tag "${{ steps.runtime_base.outputs.ref }}" moodle-runtime-base:ci

      - name: Build runtime base image fallback
        if: steps.pull_runtime_base.outcome != 'success'
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          file: services/moodle/docker/runtime-base/Dockerfile
          load: true
          tags: moodle-runtime-base:ci

      - name: Build backend Docker image
        uses: docker/build-push-action@v7
        with:
          context: services/moodle
          load: true
          push: false
          tags: moodle:test
          build-args: |
            RUNTIME_BASE_IMAGE=moodle-runtime-base:ci
